[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

[[redirects]]
  from = "/api/stories"
  to = "/.netlify/functions/stories-save"
  status = 200

[[redirects]]
  from = "/api/stories/all"
  to = "/.netlify/functions/stories-get"
  status = 200
